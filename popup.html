<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Codex OAuth 授权</title>
  <style>
    body { min-width: 340px; font-family: sans-serif; padding: 12px; }
    #status { margin: 10px 0; font-size: 14px; color: #387ced; }
    .actions { display: flex; gap: 8px; margin-bottom: 10px; }
    button { padding: 8px 12px; font-size: 14px; cursor: pointer; }
    pre { white-space: pre-wrap; word-break: break-word; background: #f6f8fa; padding: 10px; border-radius: 8px; font-size: 12px; max-height: 260px; overflow: auto; }
  </style>
</head>
<body>
  <div class="actions">
    <button id="login">开始授权</button>
    <button id="open-options">设置</button>
  </div>
  <div id="status"></div>
  <pre id="details"></pre>
  <script src="popup.js"></script>
</body>
</html>
